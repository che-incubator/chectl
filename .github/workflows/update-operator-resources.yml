name: Update Operator Resources
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies and rebuild
        run: yarn --immutable && yarn rebuild

      - name: Record operator revisions
        run: bash record-revisions.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- ':!REVISIONS'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-operator-resources-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: update operator resources"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update operator resources" \
            --body "Automated daily update of operator resources from upstream repositories." \
            --base main \
            --head "$BRANCH"
